<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120" role="img" aria-label="MemaxLabs logo (dark background variant)">
  <title>MemaxLabs (Dark Background)</title>
  <!-- Dark background -->
  <rect width="400" height="120" fill="#0A0A1A"/>
  <!-- Logomark -->
  <g transform="translate(10, 10)">
    <!-- Outer hexagon -->
    <polygon points="50,0 95,25 95,75 50,100 5,75 5,25" fill="#0066FF" />
    <!-- Inner M shape -->
    <polyline points="20,70 20,30 50,55 80,30 80,70" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Wordmark -->
  <text x="125" y="58" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">Memax</text>
  <text x="125" y="88" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#00D4FF" letter-spacing="4">LABS</text>
</svg>
